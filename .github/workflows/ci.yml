name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            elixir: "1.16.x"
            otp: "26.x"
          - os: ubuntu-latest
            elixir: "1.17.x"
            otp: "27.x"
          - os: macos-latest
            elixir: "1.17.x"
            otp: "27.x"
    runs-on: ${{ matrix.os }}
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/Elixir (Linux)
        if: runner.os == 'Linux'
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Set up Erlang/Elixir (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install elixir

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test --include concurrency
