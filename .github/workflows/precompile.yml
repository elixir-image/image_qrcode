name: precompile

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# softprops/action-gh-release needs write access to create / update the
# GitHub Release that hosts the precompiled NIF tarballs. The default
# GITHUB_TOKEN is read-only on repos created with the modern default.
permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: prod
    # One job per NIF ABI we want to ship for. OTP 27 emits NIF 2.17, OTP 28
    # emits NIF 2.18 — so each matrix entry produces a distinct filename and
    # there's no upload race on the shared release. Elixir 1.19 supports both
    # OTP versions. Multi-OTP runtime testing happens in ci.yml.
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: "27.x"
            elixir: "1.19.x"
          - otp: "28.x"
            elixir: "1.19.x"
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      # taiki-e/setup-cross-toolchain-action pulls a prebuilt musl toolchain
      # from ghcr.io/taiki-e/rust-cross-toolchain, sidestepping musl.cc which
      # is unreliable. The toolchain ships binaries under both the Rust triple
      # name (x86_64-unknown-linux-musl-gcc) AND the short triple name
      # (x86_64-linux-musl-gcc), so cc_precompiler's existing config works
      # against /usr/local/bin without any further mapping.
      - name: Install musl cross-toolchain (x86_64)
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install musl cross-toolchain (aarch64)
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-musl

      - name: Verify musl cross-compilers are on PATH
        run: |
          set -eu
          for arch in x86_64 aarch64; do
            command -v "${arch}-linux-musl-gcc" >/dev/null \
              || { echo "::error::${arch}-linux-musl-gcc not found on PATH"; exit 1; }
            "${arch}-linux-musl-gcc" --version | head -1
          done

      - name: Install GNU cross-compilers
        # cc_precompiler requires BOTH ${prefix}gcc and ${prefix}g++ for a
        # target to be considered available, so we install the g++ packages
        # alongside the gcc packages even though our NIF is pure C.
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make curl tar \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - run: mix deps.get

      - name: Pre-compile NIF artefacts
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$PWD/cache
          mkdir -p "$ELIXIR_MAKE_CACHE_DIR"
          mix elixir_make.precompile

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: cache/image_qrcode-*.tar.gz

  macos:
    runs-on: macos-latest
    env:
      MIX_ENV: prod
    # One job per NIF ABI we want to ship for. OTP 27 emits NIF 2.17, OTP 28
    # emits NIF 2.18 — so each matrix entry produces a distinct filename and
    # there's no upload race on the shared release. Elixir 1.19 supports both
    # OTP versions. Multi-OTP runtime testing happens in ci.yml.
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: "27.x"
            elixir: "1.19.x"
          - otp: "28.x"
            elixir: "1.19.x"
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - run: mix deps.get

      - name: Pre-compile NIF artefacts (universal — x86_64 + arm64)
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$PWD/cache
          mkdir -p "$ELIXIR_MAKE_CACHE_DIR"
          mix elixir_make.precompile

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: cache/image_qrcode-*.tar.gz
