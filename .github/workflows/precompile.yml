name: precompile

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# softprops/action-gh-release needs write access to create / update the
# GitHub Release that hosts the precompiled NIF tarballs. The default
# GITHUB_TOKEN is read-only on repos created with the modern default.
permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: prod
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17.x"
            otp: "26.x"
          - elixir: "1.17.x"
            otp: "27.x"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache musl cross-compilers
        id: cache-musl
        uses: actions/cache@v4
        with:
          path: |
            x86_64-linux-musl-cross
            aarch64-linux-musl-cross
          key: musl-${{ runner.os }}-build

      - if: steps.cache-musl.outputs.cache-hit != 'true'
        name: Install musl cross-compilers
        run: |
          curl -fsSL https://more.musl.cc/11.2.1/x86_64-linux-musl/x86_64-linux-musl-cross.tgz | tar -xz
          curl -fsSL https://more.musl.cc/11.2.1/x86_64-linux-musl/aarch64-linux-musl-cross.tgz | tar -xz

      - name: Install GNU cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make curl tar \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf
          echo "$PWD/x86_64-linux-musl-cross/bin" >> $GITHUB_PATH
          echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - run: mix deps.get

      - name: Pre-compile NIF artefacts
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$PWD/cache
          mkdir -p "$ELIXIR_MAKE_CACHE_DIR"
          mix elixir_make.precompile

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: cache/*.tar.gz

  macos:
    runs-on: macos-latest
    env:
      MIX_ENV: prod
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17.x"
            otp: "26.x"
          - elixir: "1.17.x"
            otp: "27.x"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - run: mix deps.get

      - name: Pre-compile NIF artefacts (universal — x86_64 + arm64)
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$PWD/cache
          mkdir -p "$ELIXIR_MAKE_CACHE_DIR"
          mix elixir_make.precompile

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: cache/*.tar.gz
