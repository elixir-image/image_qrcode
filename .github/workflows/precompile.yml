name: precompile

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# softprops/action-gh-release needs write access to create / update the
# GitHub Release that hosts the precompiled NIF tarballs. The default
# GITHUB_TOKEN is read-only on repos created with the modern default.
permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: prod
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17.x"
            otp: "26.x"
          - elixir: "1.17.x"
            otp: "27.x"
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      # taiki-e/setup-cross-toolchain-action pulls a prebuilt musl toolchain
      # from ghcr.io/taiki-e/rust-cross-toolchain, sidestepping musl.cc which
      # is unreliable. The action installs binaries named with the Rust triple
      # (x86_64-unknown-linux-musl-gcc); we symlink them to the names cc_precompiler
      # expects (x86_64-linux-musl-gcc) so the artefact filenames stay stable.
      - name: Install musl cross-toolchain (x86_64)
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install musl cross-toolchain (aarch64)
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-musl

      - name: Map musl toolchain names for cc_precompiler
        run: |
          set -eu
          for arch in x86_64 aarch64; do
            for tool in gcc g++; do
              src="/usr/local/bin/${arch}-unknown-linux-musl-${tool}"
              dst="/usr/local/bin/${arch}-linux-musl-${tool}"
              if [ ! -e "$src" ]; then
                echo "::error::Expected $src to exist after taiki-e/setup-cross-toolchain-action"
                exit 1
              fi
              sudo ln -sf "$src" "$dst"
              echo "Linked $dst -> $src"
            done
          done

      - name: Install GNU cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make curl tar \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf

      - run: mix deps.get

      - name: Pre-compile NIF artefacts
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$PWD/cache
          mkdir -p "$ELIXIR_MAKE_CACHE_DIR"
          mix elixir_make.precompile

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: cache/image_qrcode-*.tar.gz

  macos:
    runs-on: macos-latest
    env:
      MIX_ENV: prod
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17.x"
            otp: "26.x"
          - elixir: "1.17.x"
            otp: "27.x"
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - run: mix deps.get

      - name: Pre-compile NIF artefacts (universal — x86_64 + arm64)
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$PWD/cache
          mkdir -p "$ELIXIR_MAKE_CACHE_DIR"
          mix elixir_make.precompile

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: cache/image_qrcode-*.tar.gz
